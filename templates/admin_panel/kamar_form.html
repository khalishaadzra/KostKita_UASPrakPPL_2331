{% extends 'admin_panel/base_admin.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div style="background:#fff;border-radius:24px;padding:2rem;border:1px solid #f0f0f0;">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label style="font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;display:block;">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<small style="color:red;">{{ field.errors.0 }}</small>{% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn" style="background:#1a1a1a;color:#fff;border-radius:12px;padding:0.65rem 2rem;">Simpan</button>
          <a href="{% url 'kamar_list' %}" class="btn" style="background:#f5f5f5;color:#333;border-radius:12px;padding:0.65rem 2rem;">Batal</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
