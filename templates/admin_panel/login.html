<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - KostKita</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#1a1a1a; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; }
    .card { background:#fff; border-radius:24px; padding:3rem; width:100%; max-width:400px; border:none; }
    .form-control { border:1.5px solid #eee; border-radius:12px; padding:0.75rem 1rem; font-size:0.9rem; }
    .form-control:focus { border-color:#1a1a1a; box-shadow:none; }
    .btn-login { background:#1a1a1a; color:#fff; border:none; border-radius:12px; padding:0.8rem; font-weight:600; width:100%; font-size:0.95rem; }
    .btn-login:hover { background:#333; color:#fff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="text-center mb-4">
      <h4 style="font-weight:800;">🏠 KostKita</h4>
      <p style="color:#888;font-size:0.88rem;margin:0;">Admin Panel</p>
    </div>
    {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-danger" style="border-radius:12px;font-size:0.85rem;">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label style="font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;display:block;">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Username admin" required autofocus>
      </div>
      <div class="mb-4">
        <label style="font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;display:block;">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Password" required>
      </div>
      <button type="submit" class="btn-login">Masuk</button>
    </form>
    <div class="text-center mt-3">
      <a href="{% url 'landing' %}" style="color:#888;font-size:0.82rem;text-decoration:none;">← Kembali ke Website</a>
    </div>
  </div>
</body>
</html>
