{% extends 'admin_panel/base_admin.html' %}
{% block title %}Konfirmasi Hapus{% endblock %}
{% block page_title %}Konfirmasi Hapus{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div style="background:#fff;border-radius:24px;padding:2.5rem;text-align:center;border:1px solid #f0f0f0;">
      <div style="font-size:3rem;margin-bottom:1rem;">🗑️</div>
      <h5 style="font-weight:800;">Hapus Data?</h5>
      <p style="color:#888;font-size:0.9rem;">Kamu yakin ingin menghapus <strong>{{ nama }}</strong>?<br>Tindakan ini tidak bisa dibatalkan.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn" style="background:#c62828;color:#fff;border-radius:12px;padding:0.65rem 2rem;">Ya, Hapus</button>
        <a href="{% url back_url %}" class="btn" style="background:#f5f5f5;color:#333;border-radius:12px;padding:0.65rem 2rem;">Batal</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
