<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}KostKita{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --dark:#1a1a1a; --cream:#f5f0eb; --accent:#c8a97e; --muted:#6b6b6b; }
    * { font-family:'Segoe UI',sans-serif; }
    body { background:#fff; color:var(--dark); }
    .back-btn {
      display:inline-flex; align-items:center; gap:0.5rem;
      color:var(--muted); text-decoration:none; font-size:0.88rem;
      padding:0.5rem 0; transition:color 0.2s;
    }
    .back-btn:hover { color:var(--dark); }
    .page-header {
      padding:2rem 0 1rem;
      border-bottom:1px solid #f5f5f5;
      margin-bottom:2.5rem;
    }
    footer { background:var(--dark); color:#888; padding:3rem 0; margin-top:5rem; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

{% if messages %}
<div style="position:fixed;top:1rem;right:1rem;z-index:9999;min-width:300px;">
  {% for msg in messages %}
  <div class="alert alert-dismissible fade show {% if msg.tags == 'error' %}alert-danger{% else %}alert-success{% endif %}" style="border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,0.1);" role="alert">
    {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
